services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '${BACKEND_PORT:-5174}:5174'
    environment:
      - DATABASE_URL=file:./data/dev.db
      - PORT=5174
      - NODE_ENV=production
      - SEED_DATABASE=${SEED_DATABASE:-false}
    volumes:
      - sqlite-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:5174/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite-data:
